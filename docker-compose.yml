version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qualitaos-postgres
    environment:
      POSTGRES_USER: qualita
      POSTGRES_PASSWORD: qualita_secure_pw
      POSTGRES_DB: qualitaos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./qualiti/backend
      dockerfile: Dockerfile
    container_name: qualitaos-backend
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://qualita:qualita_secure_pw@postgres:5432/qualitaos
      - JWT_SECRET=super_secret_qualita_jwt_key_2026_secure
      - AI_API_KEY=mock_key_for_simulation
      - AI_PROVIDER=mock
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./qualiti/frontend
      dockerfile: Dockerfile
    container_name: qualitaos-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: qualitaos-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
